<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAAQSERVI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; min-height: 100vh; }
    #app { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const SUPABASE_URL = "https://rlacqaxsedwunmlqqzoo.supabase.co";
const SUPABASE_KEY = "sb_publishable_BJcqG7mEY4yKvLkzRRAsTA_zasGKqKL";
const H = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };

async function sbGet(table) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?order=nombre`, { headers: H });
  return r.json();
}
async function sbGetServicios(fecha) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/servicios?fecha=eq.${fecha}&order=hora`, { headers: H });
  return r.json();
}
async function sbInsert(table, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST", headers: { ...H, "Prefer": "return=representation" }, body: JSON.stringify(body)
  });
  return r.json();
}
async function sbUpdate(table, id, body) {
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "PATCH", headers: { ...H, "Prefer": "return=representation" }, body: JSON.stringify(body)
  });
}
async function sbDelete(table, id) {
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: "DELETE", headers: H });
}

const ESTADOS = [
  { id: "confirmado", label: "Confirmado", color: "#e74c3c", text: "#fff" },
  { id: "facturado", label: "Facturado", color: "#f1c40f", text: "#7a6000" },
  { id: "suspendido", label: "Suspendido", color: "#95a5a6", text: "#fff" },
  { id: "recordatorio", label: "Recordatorio", color: "#3498db", text: "#fff" },
  { id: "reservado", label: "Reservado", color: "#2ecc71", text: "#222" },
];

function pad(n) { return String(n).padStart(2, "0"); }
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseDate(s) { const [y,m,d] = s.split("-"); return new Date(+y,+m-1,+d); }
function fmtDisplay(s) { return parseDate(s).toLocaleDateString("es-AR", { weekday:"long", year:"numeric", month:"long", day:"numeric" }); }
const estadoObj = id => ESTADOS.find(e => e.id === id) || ESTADOS[0];
const emptyForm = () => ({ estado:"confirmado", hora:"", equipo:"", cliente:"", direccion:"", proveedor:"", nro_equipo:"", operador:"", remito:"", factura:"", cotizacion:"" });

const inp = { width:"100%", padding:"9px 11px", fontSize:14, border:"1px solid #ddd", borderRadius:9, boxSizing:"border-box", marginBottom:9, background:"#fff", color:"#222" };
const lbl = { fontSize:11, color:"#888", marginBottom:3, display:"block", fontWeight:600, textTransform:"uppercase", letterSpacing:0.4 };
const btnP = { background:"#e74c3c", color:"#fff", border:"none", borderRadius:11, padding:"13px 20px", fontSize:14, fontWeight:700, cursor:"pointer", width:"100%" };
const btnG = { background:"transparent", color:"#555", border:"1px solid #ddd", borderRadius:11, padding:"13px 20px", fontSize:14, cursor:"pointer", width:"100%" };

const { useState, useEffect, useCallback } = React;

function App() {
  const [view, setView] = useState("calendario");
  const [date, setDate] = useState(fmtDate(new Date()));
  const [servicios, setServicios] = useState([]);
  const [listas, setListas] = useState({ equipos:[], clientes:[], proveedores:[], operadores:[] });
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(null);
  const [editId, setEditId] = useState(null);
  const [saving, setSaving] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [abmTab, setAbmTab] = useState("equipos");
  const [newItem, setNewItem] = useState("");
  const [abmLoading, setAbmLoading] = useState(false);

  const loadServicios = useCallback(async (f) => {
    setLoading(true);
    const d = await sbGetServicios(f);
    setServicios(Array.isArray(d) ? d : []);
    setLoading(false);
  }, []);

  const loadListas = useCallback(async () => {
    const [eq,cl,pr,op] = await Promise.all([sbGet("equipos"),sbGet("clientes"),sbGet("proveedores"),sbGet("operadores")]);
    setListas({ equipos:Array.isArray(eq)?eq:[], clientes:Array.isArray(cl)?cl:[], proveedores:Array.isArray(pr)?pr:[], operadores:Array.isArray(op)?op:[] });
  }, []);

  useEffect(() => { loadListas(); }, []);
  useEffect(() => { loadServicios(date); }, [date]);

  function prevDay() { const d=parseDate(date); d.setDate(d.getDate()-1); setDate(fmtDate(d)); }
  function nextDay() { const d=parseDate(date); d.setDate(d.getDate()+1); setDate(fmtDate(d)); }

  function openNuevo() { setForm(emptyForm()); setEditId(null); setModal("servicio"); }
  function openEditar(s) {
    setForm({ estado:s.estado, hora:s.hora||"", equipo:s.equipo||"", cliente:s.cliente||"", direccion:s.direccion||"", proveedor:s.proveedor||"", nro_equipo:s.nro_equipo||"", operador:s.operador||"", remito:s.remito||"", factura:s.factura||"", cotizacion:s.cotizacion||"" });
    setEditId(s.id); setModal("servicio");
  }

  async function saveServicio() {
    if (!form) return;
    setSaving(true);
    const payload = { ...form, fecha: date };
    if (editId) await sbUpdate("servicios", editId, payload);
    else await sbInsert("servicios", payload);
    await loadServicios(date);
    setSaving(false); setModal(null); setForm(null); setEditId(null);
  }

  async function deleteServicio(id) {
    await sbDelete("servicios", id);
    await loadServicios(date);
    setConfirmDel(null);
  }

  async function addAbm() {
    const v = newItem.trim(); if (!v) return;
    setAbmLoading(true);
    await sbInsert(abmTab, { nombre: v });
    await loadListas(); setNewItem(""); setAbmLoading(false);
  }
  async function removeAbm(id) {
    setAbmLoading(true);
    await sbDelete(abmTab, id);
    await loadListas(); setAbmLoading(false);
  }

  const isToday = date === fmtDate(new Date());

  return (
    <div id="app">
      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#e74c3c,#c0392b)", color:"#fff", padding:"18px 16px 14px", borderRadius:"0 0 20px 20px", marginBottom:16, boxShadow:"0 4px 20px rgba(231,76,60,0.3)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:20, fontWeight:700 }}>MAAQSERVI</div>
            <div style={{ fontSize:12, opacity:0.8, marginTop:1 }}>Gestión de Alquileres</div>
          </div>
          <div style={{ display:"flex", gap:6 }}>
            {["calendario","abm"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{ background:view===v?"rgba(255,255,255,0.25)":"transparent", color:"#fff", border:"1px solid rgba(255,255,255,0.3)", borderRadius:10, padding:"7px 13px", fontSize:12, cursor:"pointer", fontWeight:view===v?700:400 }}>
                {v==="calendario" ? "📅 Agenda" : "⚙️ Listas"}
              </button>
            ))}
          </div>
        </div>
      </div>

      {view === "calendario" && (
        <div style={{ padding:"0 12px" }}>
          {/* Navegación fecha */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12, background:"#fff", borderRadius:14, padding:"10px 14px", boxShadow:"0 1px 6px rgba(0,0,0,0.07)" }}>
            <button onClick={prevDay} style={{ background:"none", border:"none", fontSize:24, cursor:"pointer", color:"#333" }}>‹</button>
            <div style={{ textAlign:"center", flex:1 }}>
              <div style={{ fontSize:13, fontWeight:600, color:"#222", textTransform:"capitalize" }}>{fmtDisplay(date)}</div>
              {!isToday && <button onClick={() => setDate(fmtDate(new Date()))} style={{ background:"none", border:"none", color:"#e74c3c", fontSize:11, cursor:"pointer", marginTop:2, fontWeight:600 }}>← Hoy</button>}
            </div>
            <button onClick={nextDay} style={{ background:"none", border:"none", fontSize:24, cursor:"pointer", color:"#333" }}>›</button>
          </div>

          {/* Leyenda */}
          <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:12 }}>
            {ESTADOS.map(e => <span key={e.id} style={{ background:e.color, color:e.text, fontSize:10, padding:"3px 9px", borderRadius:20, fontWeight:700 }}>{e.label}</span>)}
          </div>

          {/* Servicios */}
          {loading ? (
            <div style={{ textAlign:"center", padding:"40px 0", color:"#aaa" }}>Cargando...</div>
          ) : servicios.length === 0 ? (
            <div style={{ textAlign:"center", padding:"40px 0", color:"#aaa", fontSize:14 }}>No hay servicios para este día</div>
          ) : servicios.map(s => {
            const est = estadoObj(s.estado);
            return (
              <div key={s.id} style={{ background:"#fff", borderLeft:`4px solid ${est.color}`, borderRadius:12, padding:"12px 14px", marginBottom:10, boxShadow:"0 1px 6px rgba(0,0,0,0.06)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                    <span style={{ background:est.color, color:est.text, fontSize:10, padding:"3px 9px", borderRadius:20, fontWeight:700 }}>{est.label}</span>
                    {s.hora && <span style={{ fontSize:12, color:"#888" }}>🕐 {s.hora}</span>}
                  </div>
                  <div style={{ display:"flex", gap:4 }}>
                    <button onClick={() => openEditar(s)} style={{ background:"#f0f0f0", border:"none", borderRadius:8, padding:"5px 8px", cursor:"pointer" }}>✏️</button>
                    <button onClick={() => setConfirmDel(s.id)} style={{ background:"#fff0f0", border:"none", borderRadius:8, padding:"5px 8px", cursor:"pointer" }}>🗑️</button>
                  </div>
                </div>
                <div style={{ fontSize:15, fontWeight:700, color:"#222", marginBottom:3 }}>{[s.equipo,s.cliente].filter(Boolean).join(" · ") || "—"}</div>
                {s.direccion && <div style={{ fontSize:12, color:"#666", marginBottom:5 }}>📍 {s.direccion}</div>}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"3px 14px", fontSize:12 }}>
                  {[["Proveedor",s.proveedor],["N° Equipo",s.nro_equipo],["Operador",s.operador],["Remito",s.remito],["Factura",s.factura],["Cotización",s.cotizacion]].filter(([,v])=>v).map(([k,v])=>(
                    <span key={k} style={{ color:"#888" }}>{k}: <b style={{ color:"#333" }}>{v}</b></span>
                  ))}
                </div>
              </div>
            );
          })}
          <button onClick={openNuevo} style={{ ...btnP, marginTop:8, padding:"15px", fontSize:15, borderRadius:14, boxShadow:"0 4px 15px rgba(231,76,60,0.3)" }}>+ Nuevo servicio</button>
        </div>
      )}

      {view === "abm" && (
        <div style={{ padding:"0 12px" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
            {["equipos","clientes","proveedores","operadores"].map(t => (
              <button key={t} onClick={() => { setAbmTab(t); setNewItem(""); }} style={{ padding:"11px", borderRadius:12, border:"none", background:abmTab===t?"#e74c3c":"#fff", color:abmTab===t?"#fff":"#555", cursor:"pointer", fontSize:13, fontWeight:700, boxShadow:"0 1px 4px rgba(0,0,0,0.08)", textTransform:"capitalize" }}>
                {t}
              </button>
            ))}
          </div>
          <div style={{ marginBottom:12 }}>
            {listas[abmTab].length === 0 && !abmLoading && <div style={{ textAlign:"center", padding:"20px 0", color:"#aaa", fontSize:14 }}>No hay {abmTab} cargados</div>}
            {listas[abmTab].map(item => (
              <div key={item.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", background:"#fff", borderRadius:12, marginBottom:7, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                <span style={{ fontSize:14, color:"#222", fontWeight:500 }}>{item.nombre}</span>
                <button onClick={() => removeAbm(item.id)} style={{ background:"#fff0f0", border:"none", color:"#e74c3c", cursor:"pointer", fontSize:20, borderRadius:8, padding:"1px 8px" }}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <input value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key==="Enter" && addAbm()} placeholder={`Nuevo ${abmTab.slice(0,-1)}...`} style={{ ...inp, marginBottom:0, flex:1, borderRadius:12 }} />
            <button onClick={addAbm} disabled={abmLoading} style={{ background:"#e74c3c", color:"#fff", border:"none", borderRadius:12, padding:"0 18px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
              {abmLoading ? "..." : "Agregar"}
            </button>
          </div>
        </div>
      )}

      {/* Modal servicio */}
      {modal === "servicio" && form && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", zIndex:100 }}>
          <div style={{ background:"#f5f5f7", borderRadius:"20px 20px 0 0", padding:"20px 16px", width:"100%", maxHeight:"92vh", overflowY:"auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <span style={{ fontSize:17, fontWeight:700, color:"#222" }}>{editId ? "Editar servicio" : "Nuevo servicio"}</span>
              <button onClick={() => { setModal(null); setForm(null); setEditId(null); }} style={{ background:"#e0e0e0", border:"none", fontSize:16, cursor:"pointer", borderRadius:20, width:30, height:30 }}>×</button>
            </div>
            <label style={lbl}>Estado</label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
              {ESTADOS.map(e => (
                <button key={e.id} onClick={() => setForm(f => ({ ...f, estado:e.id }))} style={{ background:form.estado===e.id?e.color:"#fff", color:form.estado===e.id?e.text:"#666", border:`2px solid ${e.color}`, borderRadius:20, padding:"5px 13px", fontSize:12, cursor:"pointer", fontWeight:700 }}>{e.label}</button>
              ))}
            </div>
            {[
              ["hora","Hora de llegada","time",null],
              ["equipo","Equipo","select","equipos"],
              ["cliente","Cliente","select","clientes"],
              ["direccion","Dirección","text",null],
              ["proveedor","Proveedor","select","proveedores"],
              ["nro_equipo","N° de equipo asignado","text",null],
              ["operador","Operador","select","operadores"],
              ["remito","N° de remito","text",null],
              ["factura","N° de factura","text",null],
              ["cotizacion","N° de cotización","text",null],
            ].map(([key,lbl2,type,listKey]) => (
              <div key={key}>
                <label style={lbl}>{lbl2}</label>
                {type==="select" ? (
                  <select value={form[key]} onChange={e => setForm(f => ({ ...f, [key]:e.target.value }))} style={inp}>
                    <option value="">Seleccionar...</option>
                    {listas[listKey]&&listas[listKey].map(x => <option key={x.id} value={x.nombre}>{x.nombre}</option>)}
                  </select>
                ) : (
                  <input type={type} value={form[key]} onChange={e => setForm(f => ({ ...f, [key]:e.target.value }))} style={inp} />
                )}
              </div>
            ))}
            <div style={{ display:"flex", gap:10, marginTop:8 }}>
              <button onClick={() => { setModal(null); setForm(null); setEditId(null); }} style={{ ...btnG, flex:1 }}>Cancelar</button>
              <button onClick={saveServicio} disabled={saving} style={{ ...btnP, flex:2, opacity:saving?0.7:1 }}>{saving?"Guardando...":"Guardar"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Confirm delete */}
      {confirmDel && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:24 }}>
          <div style={{ background:"#fff", borderRadius:18, padding:24, width:"100%", maxWidth:320 }}>
            <div style={{ fontSize:16, fontWeight:700, marginBottom:8 }}>¿Eliminar servicio?</div>
            <div style={{ fontSize:13, color:"#888", marginBottom:22 }}>Esta acción no se puede deshacer.</div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setConfirmDel(null)} style={{ ...btnG, flex:1 }}>Cancelar</button>
              <button onClick={() => deleteServicio(confirmDel)} style={{ ...btnP, flex:1 }}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
