async function GET(t,q){const r=await fetch(SB+"/rest/v1/"+t+(q||""),{headers:HD});return r.json();}
async function POST(t,b){const r=await fetch(SB+"/rest/v1/"+t,{method:"POST",headers:{...HD,"Prefer":"return=representation"},body:JSON.stringify(b)});return r.json();}
async function PATCH(t,id,b){await fetch(SB+"/rest/v1/"+t+"?id=eq."+id,{method:"PATCH",headers:HD,body:JSON.stringify(b)});}
async function DEL(t,id){await fetch(SB+"/rest/v1/"+t+"?id=eq."+id,{method:"DELETE",headers:HD});}

const ESTADOS=[
  {id:"confirmado",label:"Confirmado",color:"#e74c3c",text:"#fff"},
  {id:"facturado",label:"Facturado",color:"#f1c40f",text:"#7a6000"},
  {id:"suspendido",label:"Suspendido",color:"#95a5a6",text:"#fff"},
  {id:"recordatorio",label:"Recordatorio",color:"#3498db",text:"#fff"},
  {id:"reservado",label:"Reservado",color:"#2ecc71",text:"#222"},
];

function pad(n){return String(n).padStart(2,"0");}
function hoy(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pD(s){const[y,m,d]=s.split("-");return new Date(+y,+m-1,+d);}
function fmtL(s){return pD(s).toLocaleDateString("es-AR",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}
function fmtC(s){return pD(s).toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});}
function sumD(s,n){const d=pD(s);d.setDate(d.getDate()+n);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function lunSem(s){const d=pD(s);d.setDate(d.getDate()-d.getDay());return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function iniMes(s){const d=pD(s);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01";}
function finMes(s){const d=pD(s);return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split("T")[0];}
function getEst(id){return ESTADOS.find(e=>e.id===id)||ESTADOS[0];}
function parseSrvs(txt){if(!txt||txt.trim()==="")return[];return txt.split("||").map(s=>s.trim()).filter(Boolean);}
function joinSrvs(arr){return arr.join("||");}

const INP={width:"100%",padding:"10px 12px",fontSize:15,border:"1px solid #ddd",borderRadius:10,boxSizing:"border-box",marginBottom:10,background:"#fff",color:"#222"};

const BTNG={background:"#fff",color:"#555",border:"1px solid #ddd",borderRadius:12,padding:"14px",fontSize:15,cursor:"pointer",width:"100%"};

function Login({onLogin}) {
  const [pwd,setPwd]=React.useState("");
  const [error,setError]=React.useState(false);
  function intentar(){
    if(pwd===PASS){onLogin();}
    else{setError(true);setPwd("");}
  }
  return (
    <div style={{maxWidth:360,margin:"80px auto 0",padding:"0 24px"}}>
      <div style={{background:"linear-gradient(135deg,#e74c3c,#c0392b)",borderRadius:20,padding:"32px 24px",boxShadow:"0 8px 32px rgba(231,76,60,0.3)",textAlign:"center",color:"#fff",marginBottom:24}}>
        <div style={{fontSize:28,fontWeight:700,marginBottom:4}}>MAQSERVI SRL</div>
        <div style={{fontSize:13,opacity:0.85}}>Gestión de Alquileres</div>
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:"24px",boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:15,fontWeight:600,color:"#222",marginBottom:16,textAlign:"center"}}>🔒 Ingresá tu contraseña</div>
        <input type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setError(false);}} onKeyDown={e=>e.key==="Enter"&&intentar()} placeholder="Contraseña..." style={{width:"100%",padding:"12px 14px",fontSize:15,border:"2px solid "+(error?"#e74c3c":"#ddd"),borderRadius:10,boxSizing:"border-box",marginBottom:8,outline:"none",background:"#fff",color:"#222"}}/>
        {error&&<div style={{color:"#e74c3c",fontSize:13,marginBottom:8,textAlign:"center"}}>Contraseña incorrecta</div>}
        <button onClick={intentar} style={{...BTNR,marginTop:4}}>Ingresar</button>
      </div>
    </div>
  );
}

  const est=getEst(s.estado);

  if(s.estado==="recordatorio") return (

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <span style={{background:"#3498db",color:"#fff",fontSize:10,padding:"3px 9px",borderRadius:20,fontWeight:700}}>📝 Recordatorio</span>

    </div>

  return (
    <div style={{background:"#fff",borderLeft:"4px solid "+est.color,borderRadius:12,padding:"12px 14px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{background:est.color,color:est.text,fontSize:10,padding:"3px 9px",borderRadius:20,fontWeight:700}}>{est.label}</span>
          {s.hora&&<span style={{fontSize:12,color:"#888"}}>🕐 {s.hora}</span>}
          <span style={{fontSize:11,color:"#bbb"}}>{fmtC(s.fecha)}</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>onEditar(s)} style={{background:"#f0f0f0",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer"}}>✏️</button>
          <button onClick={()=>onBorrar(s.id)} style={{background:"#fff0f0",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer"}}>🗑️</button>
        </div>
      </div>
      {srvs.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
          {srvs.map((srv,i)=><span key={i} style={{background:"#fde8e8",color:"#c0392b",fontSize:12,padding:"3px 10px",borderRadius:20,fontWeight:600}}>🔧 {srv}</span>)}
        </div>
      )}
      {s.cliente&&<div style={{fontSize:15,fontWeight:700,color:"#222",marginBottom:3}}>{s.cliente}</div>}
      {s.direccion&&<div style={{fontSize:12,color:"#666",marginBottom:5}}>📍 {s.direccion}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 14px",fontSize:12,marginBottom:4}}>
        {[["Proveedor",s.proveedor],["N° Equipo",s.nro_equipo],["Operador",s.operador],["Remito",s.remito],["Factura",s.factura],["Cotización",s.cotizacion]].filter(x=>x[1]).map(x=>(
          <span key={x[0]} style={{color:"#888"}}>{x[0]}: <b style={{color:"#333"}}>{x[1]}</b></span>
        ))}
      </div>
      {(s.contacto_nombre||s.contacto_celular)&&(
        <div style={{background:"#f0f7ff",border:"1px solid #d0e8ff",borderRadius:8,padding:"6px 10px",marginTop:5,fontSize:12}}>
          <span style={{fontWeight:700,color:"#2980b9"}}>👤 Contacto en obra: </span>
          {s.contacto_nombre&&<span style={{color:"#222",fontWeight:600}}>{s.contacto_nombre}</span>}
          {s.contacto_nombre&&s.contacto_celular&&<span style={{color:"#888"}}> · </span>}
          {s.contacto_celular&&<a href={"tel:"+s.contacto_celular} style={{color:"#e74c3c",fontWeight:600,textDecoration:"none"}}>📞 {s.contacto_celular}</a>}
        </div>
      )}
      {s.lista_n_precio&&(
        <div style={{marginTop:6,background:s.lista_n_cobrado?"#eafaf1":"#fef9e7",border:"1px solid "+(s.lista_n_cobrado?"#2ecc71":"#f1c40f"),borderRadius:8,padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,fontWeight:700}}>💰 Lista N: ${s.lista_n_precio}</span>
          <span style={{fontSize:11,fontWeight:700,color:s.lista_n_cobrado?"#27ae60":"#e67e22"}}>{s.lista_n_cobrado?"✅ Cobrado":"⏳ Pendiente"}</span>
        </div>
      )}
    </div>

}

function Main() {
  const [vista,setVista]=React.useState("agenda");
  const [modo,setModo]=React.useState("dia");
  const [fecha,setFecha]=React.useState(hoy());
  const [items,setItems]=React.useState([]);
  const [todos,setTodos]=React.useState([]);
  const [listas,setListas]=React.useState({equipos:[],clientes:[],proveedores:[],operadores:[]});
  const [cargando,setCargando]=React.useState(true);
  const [modal,setModal]=React.useState(false);
  const [editId,setEditId]=React.useState(null);
  const [guardando,setGuardando]=React.useState(false);
  const [borrar,setBorrar]=React.useState(null);
  const [abmTab,setAbmTab]=React.useState("equipos");
  const [nuevoAbm,setNuevoAbm]=React.useState("");
  const [bTexto,setBTexto]=React.useState("");
  const [bEstado,setBEstado]=React.useState("todos");
  const [bDesde,setBDesde]=React.useState("");
  const [bHasta,setBHasta]=React.useState("");
  const [bListaN,setBListaN]=React.useState("todos");

  const [fHora,setFHora]=React.useState("");
  const [fCliente,setFCliente]=React.useState("");
  const [fDireccion,setFDireccion]=React.useState("");
  const [fProveedor,setFProveedor]=React.useState("");
  const [fNroEq,setFNroEq]=React.useState("");
  const [fOperador,setFOperador]=React.useState("");
  const [fRemito,setFRemito]=React.useState("");
  const [fFactura,setFFactura]=React.useState("");
  const [fCotizacion,setFCotizacion]=React.useState("");
  const [fPrecio,setFPrecio]=React.useState("");
  const [fCobrado,setFCobrado]=React.useState(false);
  const [fFechaCobro,setFFechaCobro]=React.useState("");
  const [fRecordatorio,setFRecordatorio]=React.useState("");
  const [fServicios,setFServicios]=React.useState([]);

  const [fContactoNombre,setFContactoNombre]=React.useState("");

  function getRango(){
    if(modo==="dia")return[fecha,fecha];
    if(modo==="semana"){const s=lunSem(fecha);return[s,sumD(s,6)];}
    return[iniMes(fecha),finMes(fecha)];
  }

  async function recargar(){
    setCargando(true);
    const[d1,d2]=getRango();
    const data=await GET("servicios","?fecha=gte."+d1+"&fecha=lte."+d2+"&order=fecha,hora");
    setItems(Array.isArray(data)?data:[]);
    setCargando(false);
  }

  async function recargarTodos(){
    const data=await GET("servicios","?order=fecha,hora");
    setTodos(Array.isArray(data)?data:[]);
  }

  async function recargarListas(){
    const[eq,cl,pr,op]=await Promise.all([GET("equipos","?order=nombre"),GET("clientes","?order=nombre"),GET("proveedores","?order=nombre"),GET("operadores","?order=nombre")]);
    setListas({equipos:Array.isArray(eq)?eq:[],clientes:Array.isArray(cl)?cl:[],proveedores:Array.isArray(pr)?pr:[],operadores:Array.isArray(op)?op:[]});
  }

  React.useEffect(()=>{recargarListas();},[]);
  React.useEffect(()=>{recargar();},[fecha,modo]);
  React.useEffect(()=>{if(vista==="buscar")recargarTodos();},[vista]);

  function abrirNuevo(){
    setEditId(null);
    setFEstado("confirmado");setFHora("");setFCliente("");setFDireccion("");setFProveedor("");
    setFNroEq("");setFOperador("");setFRemito("");setFFactura("");setFCotizacion("");
    setFPrecio("");setFCobrado(false);setFFechaCobro("");setFRecordatorio("");
    setFServicios([]);setSelSrv("");setManualSrv("");
    setFContactoNombre("");setFContactoCelular("");
    setFechaEdit(null);
    setModoNuevoCli(false);setModoNuevoProv(false);
    setModal(true);
  }

  function abrirEditar(s){
    setEditId(s.id);
    setFEstado(s.estado||"confirmado");setFHora(s.hora||"");setFCliente(s.cliente||"");
    setFDireccion(s.direccion||"");setFProveedor(s.proveedor||"");setFNroEq(s.nro_equipo||"");
    setFOperador(s.operador||"");setFRemito(s.remito||"");setFFactura(s.factura||"");
    setFCotizacion(s.cotizacion||"");setFPrecio(s.lista_n_precio||"");setFCobrado(s.lista_n_cobrado||false);
    setFFechaCobro(s.lista_n_fecha_cobro||"");setFRecordatorio(s.recordatorio_texto||"");
    setFServicios(parseSrvs(s.servicios_lista));
    setFContactoNombre(s.contacto_nombre||"");setFContactoCelular(s.contacto_celular||"");
    setFechaEdit(s.fecha);
    setSelSrv("");setManualSrv("");setModoNuevoCli(false);setModoNuevoProv(false);
    setModal(true);
  }

  function agregarSrvSelect(){
    if(!selSrv)return;
    if(!fServicios.includes(selSrv))setFServicios(prev=>[...prev,selSrv]);
    setSelSrv("");
  }

  function agregarSrvManual(){
    const v=manualSrv.trim();if(!v)return;
    if(!fServicios.includes(v))setFServicios(prev=>[...prev,v]);
    setManualSrv("");
  }

  async function guardar(){
    setGuardando(true);
    const payload={
      estado:fEstado,hora:fHora,cliente:fCliente,direccion:fDireccion,
      proveedor:fProveedor,nro_equipo:fNroEq,operador:fOperador,
      remito:fRemito,factura:fFactura,cotizacion:fCotizacion,
      lista_n_precio:fPrecio,lista_n_cobrado:fCobrado,
      lista_n_fecha_cobro:fFechaCobro||null,recordatorio_texto:fRecordatorio,
      servicios_lista:joinSrvs(fServicios),
      contacto_nombre:fContactoNombre,contacto_celular:fContactoCelular,
      fecha: editId ? fechaEdit : fecha
    };
    if(editId){await PATCH("servicios",editId,payload);}
    else{await POST("servicios",payload);}
    await recargar();
    if(vista==="buscar")await recargarTodos();
    setGuardando(false);setModal(false);setEditId(null);
  }

  async function eliminar(id){
    await DEL("servicios",id);
    await recargar();
    if(vista==="buscar")await recargarTodos();
    setBorrar(null);
  }

  async function guardarNuevoCli(){
    const v=nuevoCliente.trim();if(!v)return;
    await POST("clientes",{nombre:v});await recargarListas();
    setFCliente(v);setNuevoCliente("");setModoNuevoCli(false);
  }

  async function guardarNuevoProv(){
    const v=nuevoProv.trim();if(!v)return;
    await POST("proveedores",{nombre:v});await recargarListas();
    setFProveedor(v);setNuevoProv("");setModoNuevoProv(false);
  }

  async function addAbm(){const v=nuevoAbm.trim();if(!v)return;await POST(abmTab,{nombre:v});await recargarListas();setNuevoAbm("");}
  async function delAbm(id){await DEL(abmTab,id);await recargarListas();}

  const porFecha={};
  items.forEach(s=>{if(!porFecha[s.fecha])porFecha[s.fecha]=[];porFecha[s.fecha].push(s);});

  function getDias(){
    if(modo==="semana"){const s=lunSem(fecha);return Array.from({length:7},(_,i)=>sumD(s,i));}
    if(modo==="mes"){const s=iniMes(fecha),e=finMes(fecha),d=[];let c=s;while(c<=e){d.push(c);c=sumD(c,1);}return d;}
    return[fecha];
  }

  const filtrados=todos.filter(s=>{
    if(bEstado!=="todos"&&s.estado!==bEstado)return false;
    if(bDesde&&s.fecha<bDesde)return false;
    if(bHasta&&s.fecha>bHasta)return false;
    if(bListaN==="con"&&!s.lista_n_precio)return false;
    if(bListaN==="cobrado"&&(!s.lista_n_precio||!s.lista_n_cobrado))return false;
    if(bListaN==="pendiente"&&(!s.lista_n_precio||s.lista_n_cobrado))return false;
    if(bTexto){const t=bTexto.toLowerCase();return[s.cliente,s.proveedor,s.remito,s.factura,s.cotizacion,s.direccion,s.recordatorio_texto].some(v=>v&&v.toLowerCase().includes(t));}
    return true;
  });

  const esHoy=fecha===hoy();
  const esRec=fEstado==="recordatorio";

  return (
    <div style={{maxWidth:480,margin:"0 auto",background:"#f5f5f7",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:"linear-gradient(135deg,#e74c3c,#c0392b)",color:"#fff",padding:"16px 14px 12px",borderRadius:"0 0 20px 20px",marginBottom:14,boxShadow:"0 4px 20px rgba(231,76,60,0.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:20,fontWeight:700}}>MAQSERVI SRL</div>
            <div style={{fontSize:11,opacity:0.8}}>Gestión de Alquileres</div>
          </div>
          <div style={{display:"flex",gap:5}}>
            {[["agenda","📅"],["buscar","🔍"],["abm","⚙️"]].map(([v,ic])=>(
              <button key={v} onClick={()=>setVista(v)} style={{background:vista===v?"rgba(255,255,255,0.28)":"transparent",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,padding:"6px 11px",fontSize:13,cursor:"pointer",fontWeight:vista===v?700:400}}>{ic}</button>
            ))}
          </div>
        </div>
        {vista==="agenda"&&(
          <div style={{display:"flex",gap:6}}>
            {["dia","semana","mes"].map(v=>(
              <button key={v} onClick={()=>setModo(v)} style={{background:modo===v?"rgba(255,255,255,0.28)":"transparent",color:"#fff",border:"1px solid rgba(255,255,255,0.25)",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:modo===v?700:400,textTransform:"capitalize",flex:1}}>{v}</button>
            ))}
          </div>
        )}
      </div>

      {vista==="agenda"&&(
        <div style={{padding:"0 12px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,background:"#fff",borderRadius:14,padding:"10px 14px",boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <button onClick={()=>{
              if(modo==="dia")setFecha(sumD(fecha,-1));
              else if(modo==="semana")setFecha(sumD(lunSem(fecha),-7));
              else{const d=pD(fecha);d.setMonth(d.getMonth()-1);setFecha(d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()));}
            }} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#333"}}>‹</button>
            <div style={{textAlign:"center",flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:"#222",textTransform:"capitalize"}}>
                {modo==="dia"?fmtL(fecha):modo==="semana"?(()=>{const s=lunSem(fecha),e=sumD(s,6);return pD(s).toLocaleDateString("es-AR",{day:"numeric",month:"short"})+" - "+pD(e).toLocaleDateString("es-AR",{day:"numeric",month:"short",year:"numeric"});})():pD(fecha).toLocaleDateString("es-AR",{month:"long",year:"numeric"})}
              </div>
              {!esHoy&&<button onClick={()=>setFecha(hoy())} style={{background:"none",border:"none",color:"#e74c3c",fontSize:11,cursor:"pointer",fontWeight:600}}>← Hoy</button>}
            </div>
            <button onClick={()=>{
              if(modo==="dia")setFecha(sumD(fecha,1));
              else if(modo==="semana")setFecha(sumD(lunSem(fecha),7));
              else{const d=pD(fecha);d.setMonth(d.getMonth()+1);setFecha(d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()));}
            }} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#333"}}>›</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {ESTADOS.map(e=><span key={e.id} style={{background:e.color,color:e.text,fontSize:10,padding:"3px 9px",borderRadius:20,fontWeight:700}}>{e.label}</span>)}
          </div>
          {cargando?<div style={{textAlign:"center",padding:"40px 0",color:"#aaa"}}>Cargando...</div>:(
            modo==="dia"?(
              <div>
                {items.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"#aaa",fontSize:14}}>No hay servicios para este día</div>:items.map(s=><Tarjeta key={s.id} s={s} onEditar={abrirEditar} onBorrar={setBorrar}/>)}
              </div>
            ):(
              <div>
                {getDias().map(dia=>{
                  const srvs=porFecha[dia]||[];
                  return(
                    <div key={dia} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <span style={{fontSize:12,fontWeight:700,color:dia===hoy()?"#e74c3c":"#555",background:"#fff",borderRadius:8,padding:"4px 10px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",textTransform:"capitalize"}}>{fmtC(dia)}</span>
                        <button onClick={()=>{setFecha(dia);abrirNuevo();}} style={{background:"#e74c3c",color:"#fff",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}>+ Agregar</button>
                      </div>
                      {srvs.length===0?<div style={{fontSize:12,color:"#ccc",paddingLeft:8}}>Sin servicios</div>:srvs.map(s=><Tarjeta key={s.id} s={s} onEditar={abrirEditar} onBorrar={setBorrar}/>)}
                    </div>
                  );
                })}
              </div>
            )
          )}
          {modo==="dia"&&<button onClick={abrirNuevo} style={{...BTNR,marginTop:8,boxShadow:"0 4px 15px rgba(231,76,60,0.3)"}}>+ Nuevo servicio</button>}
        </div>
      )}

      {vista==="buscar"&&(
        <div style={{padding:"0 12px"}}>
          <div style={{background:"#fff",borderRadius:14,padding:"14px",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <label style={LBL}>Buscar</label>
            <input value={bTexto} onChange={e=>setBTexto(e.target.value)} placeholder="Cliente, remito, factura..." style={INP}/>
            <label style={LBL}>Estado</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              <button onClick={()=>setBEstado("todos")} style={{background:bEstado==="todos"?"#333":"#f0f0f0",color:bEstado==="todos"?"#fff":"#555",border:"none",borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",fontWeight:700}}>Todos</button>
              {ESTADOS.map(e=><button key={e.id} onClick={()=>setBEstado(e.id)} style={{background:bEstado===e.id?e.color:"#f0f0f0",color:bEstado===e.id?e.text:"#555",border:"none",borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",fontWeight:700}}>{e.label}</button>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div><label style={LBL}>Desde</label><input type="date" value={bDesde} onChange={e=>setBDesde(e.target.value)} style={INP}/></div>
              <div><label style={LBL}>Hasta</label><input type="date" value={bHasta} onChange={e=>setBHasta(e.target.value)} style={INP}/></div>
            </div>
            <label style={LBL}>Lista N</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {[["todos","Todos","#333"],["con","Con Lista N","#8e44ad"],["cobrado","✅ Cobrados","#27ae60"],["pendiente","⏳ Pendientes","#e67e22"]].map(([val,lbl2,col])=>(
                <button key={val} onClick={()=>setBListaN(val)} style={{background:bListaN===val?col:"#f0f0f0",color:bListaN===val?"#fff":"#555",border:"none",borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",fontWeight:700}}>{lbl2}</button>
              ))}
            </div>
          </div>
          <div style={{fontSize:12,color:"#888",marginBottom:8}}>{filtrados.length} resultado{filtrados.length!==1?"s":""}</div>
          {filtrados.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"#aaa"}}>Sin resultados</div>:filtrados.map(s=><Tarjeta key={s.id} s={s} onEditar={abrirEditar} onBorrar={setBorrar}/>)}
        </div>
      )}

      {vista==="abm"&&(
        <div style={{padding:"0 12px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {["equipos","clientes","proveedores","operadores"].map(t=>(
              <button key={t} onClick={()=>{setAbmTab(t);setNuevoAbm("");}} style={{padding:"11px",borderRadius:12,border:"none",background:abmTab===t?"#e74c3c":"#fff",color:abmTab===t?"#fff":"#555",cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",textTransform:"capitalize"}}>{t}</button>
            ))}
          </div>
          <div style={{marginBottom:12}}>
            {listas[abmTab].length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#aaa",fontSize:14}}>Sin registros</div>}
            {listas[abmTab].map(it=>(
              <div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"#fff",borderRadius:12,marginBottom:7,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                <span style={{fontSize:14,color:"#222",fontWeight:500}}>{it.nombre}</span>
                <button onClick={()=>delAbm(it.id)} style={{background:"#fff0f0",border:"none",color:"#e74c3c",cursor:"pointer",fontSize:20,borderRadius:8,padding:"1px 8px"}}>×</button>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={nuevoAbm} onChange={e=>setNuevoAbm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addAbm()} placeholder={"Nuevo "+abmTab.slice(0,-1)+"..."} style={{...INP,marginBottom:0,flex:1}}/>
            <button onClick={addAbm} style={{background:"#e74c3c",color:"#fff",border:"none",borderRadius:12,padding:"0 18px",fontSize:14,fontWeight:700,cursor:"pointer"}}>+</button>
          </div>
        </div>
      )}

      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:100}}>
          <div style={{background:"#f5f5f7",borderRadius:"20px 20px 0 0",padding:"20px 16px",width:"100%",maxHeight:"93vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:17,fontWeight:700,color:"#222"}}>{editId?"Editar":"Nuevo"} {esRec?"recordatorio":"servicio"}</span>
              <button onClick={()=>setModal(false)} style={{background:"#e0e0e0",border:"none",fontSize:18,cursor:"pointer",borderRadius:20,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            <label style={LBL}>Tipo</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {ESTADOS.map(e=>(
                <button key={e.id} onClick={()=>setFEstado(e.id)} style={{background:fEstado===e.id?e.color:"#fff",color:fEstado===e.id?e.text:"#666",border:"2px solid "+e.color,borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",fontWeight:700}}>{e.label}</button>
              ))}
            </div>
            {esRec?(
              <div>
                <label style={LBL}>Tarea / Nota</label>
                <textarea value={fRecordatorio} onChange={e=>setFRecordatorio(e.target.value)} placeholder="Escribí la tarea o recordatorio..." rows={4} style={{...INP,resize:"vertical"}}/>
              </div>
            ):(
              <div>
                <label style={LBL}>Hora de llegada</label>
                <input type="time" value={fHora} onChange={e=>setFHora(e.target.value)} style={INP}/>
                <label style={LBL}>Servicios asignados</label>
                {fServicios.length>0&&(
                  <div style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,padding:"8px 12px",marginBottom:8}}>
                    {fServicios.map((srv,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<fServicios.length-1?"1px solid #f5f5f5":"none"}}>
                        <span style={{fontSize:14,color:"#222"}}>🔧 {srv}</span>
                        <button onClick={()=>setFServicios(fServicios.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#e74c3c",cursor:"pointer",fontSize:18,fontWeight:700,padding:"0 4px"}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  <select value={selSrv} onChange={e=>setSelSrv(e.target.value)} style={{...INP,marginBottom:0,flex:1}}>
                    <option value="">Seleccionar de la lista...</option>
                    {listas.equipos.map(x=><option key={x.id} value={x.nombre}>{x.nombre}</option>)}
                  </select>
                  <button onClick={agregarSrvSelect} style={{background:"#e74c3c",color:"#fff",border:"none",borderRadius:10,padding:"0 16px",fontWeight:700,cursor:"pointer",fontSize:22,flexShrink:0}}>+</button>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:14}}>
                  <input value={manualSrv} onChange={e=>setManualSrv(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")agregarSrvManual();}} placeholder="O escribir a mano..." style={{...INP,marginBottom:0,flex:1}}/>
                  <button onClick={agregarSrvManual} style={{background:"#777",color:"#fff",border:"none",borderRadius:10,padding:"0 14px",fontWeight:700,cursor:"pointer",flexShrink:0}}>+</button>
                </div>
                <label style={LBL}>Cliente</label>
                {modoNuevoCli?(
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    <input autoFocus value={nuevoCliente} onChange={e=>setNuevoCliente(e.target.value)} onKeyDown={e=>e.key==="Enter"&&guardarNuevoCli()} placeholder="Nuevo cliente..." style={{...INP,marginBottom:0,flex:1}}/>
                    <button onClick={guardarNuevoCli} style={{background:"#2ecc71",color:"#fff",border:"none",borderRadius:9,padding:"0 12px",fontWeight:700,cursor:"pointer"}}>✓</button>
                    <button onClick={()=>setModoNuevoCli(false)} style={{background:"#eee",border:"none",borderRadius:9,padding:"0 10px",cursor:"pointer"}}>✕</button>
                  </div>
                ):(
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    <select value={fCliente} onChange={e=>setFCliente(e.target.value)} style={{...INP,marginBottom:0,flex:1}}>
                      <option value="">Seleccionar cliente...</option>
                      {listas.clientes.map(x=><option key={x.id} value={x.nombre}>{x.nombre}</option>)}
                    </select>
                    <button onClick={()=>setModoNuevoCli(true)} style={{background:"#e74c3c",color:"#fff",border:"none",borderRadius:10,padding:"0 14px",fontWeight:700,cursor:"pointer",fontSize:22,flexShrink:0}}>+</button>
                  </div>
                )}
                <label style={LBL}>Dirección</label>
                <input placeholder="Dirección de trabajo" value={fDireccion} onChange={e=>setFDireccion(e.target.value)} style={INP}/>
                <label style={LBL}>Proveedor</label>
                {modoNuevoProv?(
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    <input autoFocus value={nuevoProv} onChange={e=>setNuevoProv(e.target.value)} onKeyDown={e=>e.key==="Enter"&&guardarNuevoProv()} placeholder="Nuevo proveedor..." style={{...INP,marginBottom:0,flex:1}}/>
                    <button onClick={guardarNuevoProv} style={{background:"#2ecc71",color:"#fff",border:"none",borderRadius:9,padding:"0 12px",fontWeight:700,cursor:"pointer"}}>✓</button>
                    <button onClick={()=>setModoNuevoProv(false)} style={{background:"#eee",border:"none",borderRadius:9,padding:"0 10px",cursor:"pointer"}}>✕</button>
                  </div>
                ):(
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    <select value={fProveedor} onChange={e=>setFProveedor(e.target.value)} style={{...INP,marginBottom:0,flex:1}}>
                      <option value="">Seleccionar proveedor...</option>
                      {listas.proveedores.map(x=><option key={x.id} value={x.nombre}>{x.nombre}</option>)}
                    </select>
                    <button onClick={()=>setModoNuevoProv(true)} style={{background:"#e74c3c",color:"#fff",border:"none",borderRadius:10,padding:"0 14px",fontWeight:700,cursor:"pointer",fontSize:22,flexShrink:0}}>+</button>
                  </div>
                )}
                <label style={LBL}>N° de equipo asignado</label>
                <input placeholder="Ej: 22, 29..." value={fNroEq} onChange={e=>setFNroEq(e.target.value)} style={INP}/>
                <label style={LBL}>Operador</label>
                <select value={fOperador} onChange={e=>setFOperador(e.target.value)} style={INP}>
                  <option value="">Seleccionar...</option>
                  {listas.operadores.map(x=><option key={x.id} value={x.nombre}>{x.nombre}</option>)}
                </select>
                <label style={LBL}>Contacto en obra</label>
                <div style={{background:"#fff",border:"1px solid #ddd",borderRadius:12,padding:"12px",marginBottom:10}}>
                  <input placeholder="Nombre del contacto" value={fContactoNombre} onChange={e=>setFContactoNombre(e.target.value)} style={{...INP,marginBottom:8}}/>
                  <input placeholder="Celular" type="tel" value={fContactoCelular} onChange={e=>setFContactoCelular(e.target.value)} style={{...INP,marginBottom:0}}/>
                </div>
                <label style={LBL}>N° de remito</label>
                <input placeholder="Número de remito" value={fRemito} onChange={e=>setFRemito(e.target.value)} style={INP}/>
                <label style={LBL}>N° de factura</label>
                <input placeholder="Número de factura" value={fFactura} onChange={e=>setFFactura(e.target.value)} style={INP}/>
                <label style={LBL}>N° de cotización</label>
                <input placeholder="Número de cotización" value={fCotizacion} onChange={e=>setFCotizacion(e.target.value)} style={INP}/>
                <div style={{background:"#fff",border:"1px solid #ddd",borderRadius:12,padding:"14px",marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#333",marginBottom:10}}>💰 Lista N</div>
                  <label style={LBL}>Precio</label>
                  <input placeholder="Ej: 15000" value={fPrecio} onChange={e=>setFPrecio(e.target.value)} style={INP}/>
                  <button onClick={()=>setFCobrado(!fCobrado)} style={{background:fCobrado?"#2ecc71":"#f0f0f0",color:fCobrado?"#fff":"#555",border:"none",borderRadius:20,padding:"8px 16px",fontSize:13,cursor:"pointer",fontWeight:700,marginBottom:10,display:"block"}}>
                    {fCobrado?"✅ Cobrado":"⏳ Pendiente"}
                  </button>
                  {fCobrado&&(
                    <div>
                      <label style={LBL}>Fecha de cobro</label>
                      <input type="date" value={fFechaCobro} onChange={e=>setFFechaCobro(e.target.value)} style={INP}/>
                    </div>
                  )}
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button onClick={()=>setModal(false)} style={{...BTNG,flex:1}}>Cancelar</button>
              <button onClick={guardar} disabled={guardando} style={{...BTNR,flex:2,opacity:guardando?0.7:1}}>{guardando?"Guardando...":"Guardar"}</button>
            </div>
          </div>
        </div>
      )}

      {borrar&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:24}}>
          <div style={{background:"#fff",borderRadius:18,padding:24,width:"100%",maxWidth:320}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>¿Eliminar?</div>
            <div style={{fontSize:13,color:"#888",marginBottom:22}}>Esta acción no se puede deshacer.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setBorrar(null)} style={{...BTNG,flex:1}}>Cancelar</button>
              <button onClick={()=>eliminar(borrar)} style={{...BTNR,flex:1}}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [logueado,setLogueado]=React.useState(false);
  if(!logueado) return <Login onLogin={()=>setLogueado(true)}/>;
  return <Main/>;
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
